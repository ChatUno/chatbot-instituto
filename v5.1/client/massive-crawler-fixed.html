<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual RAG Pro V5.2-01 - Massive Crawler (Fixed)</title>
  
  <!-- React and dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/MassiveCrawlerApp.css">
  <link rel="stylesheet" href="styles/CrawlingConfig.css">
  <link rel="stylesheet" href="styles/CrawlingDashboard.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    #root {
      min-height: 100vh;
    }
    
    .loading-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      font-size: 18px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .massive-config {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px;
      margin: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .massive-config h3 {
      margin: 0 0 15px 0;
      color: #2c3e50;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .config-field label {
      font-weight: 500;
      color: #495057;
      font-size: 14px;
    }

    .config-field input,
    .config-field select {
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
    }

    .config-field small {
      color: #6c757d;
      font-size: 12px;
    }

    .test-suggestions {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px;
      margin: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .test-suggestions h3 {
      margin: 0 0 15px 0;
      color: #2c3e50;
    }

    .test-url {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .test-url:hover {
      background: #e9ecef;
    }

    .test-url .url {
      font-family: monospace;
      color: #667eea;
      font-weight: 500;
    }

    .test-url .description {
      color: #6c757d;
      font-size: 14px;
    }

    .warning-box {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      border-radius: 8px;
      padding: 15px;
      margin: 20px;
      color: #856404;
    }

    .warning-box h4 {
      margin: 0 0 10px 0;
      color: #856404;
    }

    .warning-box ul {
      margin: 10px 0;
      padding-left: 20px;
    }

    .warning-box li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-fallback">
      <div class="loading-spinner"></div>
      <span>Cargando Visual RAG Pro V5.2-01...</span>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const validateUrl = (url) => {
      try {
        new URL(url);
        return true;
      } catch {
        return false;
      }
    };

    const MassiveCrawlerFixed = () => {
      const [url, setUrl] = useState('');
      const [isStarting, setIsStarting] = useState(false);
      const [error, setError] = useState(null);
      const [sessionId, setSessionId] = useState(null);

      // CONFIGURACIÓN CORREGIDA PARA CRAWLING MASIVO REAL
      const massiveConfig = {
        crawler: {
          maxConcurrency: 10,
          maxDepth: 6,
          rateLimitDelay: 300,
          userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
          timeout: 60000,
          retryAttempts: 3,
          retryDelay: 2000
        },
        queue: {
          maxQueueSize: 50000,
          batchSize: 200
        },
        discovery: {
          maxLinksPerPage: 1000,
          // PATRONES CORREGIDOS - MENOS RESTRICTIVOS
          excludePatterns: [
            // Solo archivos binarios y patrones de autenticación
            /\.(pdf|doc|docx|xls|xlsx|ppt|pptx|zip|rar|tar|gz|7z|exe|dmg|iso|img|bin)$/i,
            /\/login/i,
            /\/logout/i,
            /\/register/i,
            /\/signup/i,
            /\/auth\//i,
            /\/oauth/i,
            /\/sso/i,
            /\/forgot/i,
            /\/reset/i,
            /\/checkout/i,
            /\/cart/i,
            /\/payment/i,
            /\/billing/i,
            /\/account/i,
            /\/profile/i,
            /\/settings/i,
            /\/user\//i,
            /\/admin\//i,
            // Eliminados: /\/api\//i (muchas documentaciones usan /api/ para APIs)
            // Eliminados: /\/download/i (algunas páginas de descarga son válidas)
            // Eliminados: /\/upload/i (algunas páginas de upload son válidas)
            // Patrones JavaScript y mailto
            /javascript:/i,
            /mailto:/i,
            /tel:/i,
            /sms:/i,
            /ftp:/i,
            /irc:/i,
            /magnet:/i,
            // Patrones de anclas y fragmentos
            /#.*$/,
            // Patrones de archivos de sistema
            /\.(css|js|json|xml|txt|log|tmp|cache|bak|old|orig|copy|swp)$/i
          ]
        },
        rateLimiter: {
          defaultDelay: 300,
          maxDelay: 5000,
          minDelay: 100,
          adaptiveMode: true,
          errorThreshold: 2,
          successThreshold: 8
        },
        retry: {
          maxAttempts: 4,
          baseDelay: 1000,
          maxDelay: 15000,
          backoffFactor: 2,
          jitter: true
        },
        duplicate: {
          similarityThreshold: 0.85,
          maxCacheSize: 500000,
          enableContentHashing: true,
          enableUrlNormalization: true,
          enableTitleMatching: true
        },
        reporting: {
          realTimeUpdates: true,
          includeScreenshots: true,
          maxReportHistory: 100
        }
      };

      const testUrls = [
        {
          url: 'https://developer.mozilla.org',
          description: 'MDN Web Docs - Debería encontrar 50-100+ páginas',
          expected: '50-100 páginas'
        },
        {
          url: 'https://docs.python.org',
          description: 'Python Documentation - Debería encontrar 100-200+ páginas',
          expected: '100-200 páginas'
        },
        {
          url: 'https://www.wikipedia.org',
          description: 'Wikipedia - Debería encontrar 500-1000+ páginas',
          expected: '500-1000 páginas'
        },
        {
          url: 'https://react.dev',
          description: 'React Documentation - Debería encontrar 30-50 páginas',
          expected: '30-50 páginas'
        },
        {
          url: 'https://nodejs.org',
          description: 'Node.js Documentation - Debería encontrar 20-40 páginas',
          expected: '20-40 páginas'
        },
        {
          url: 'https://https://iesjuandelanuza.catedu.es',
          description: 'IES Juan de Lanuza - Sitio real del instituto',
          expected: '50-100 páginas'
        }
      ];

      const startCrawling = async () => {
        if (!url || !url.trim()) {
          setError('Please enter a valid URL');
          return;
        }

        setIsStarting(true);
        setError(null);

        try {
          const response = await fetch('/api/massive-crawler/start', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              url: url.trim(),
              options: massiveConfig
            })
          });

          const data = await response.json();

          if (data.success) {
            setSessionId(data.sessionId);
            // Abrir dashboard en nueva pestaña
            window.open(`/massive-crawler.html?session=${data.sessionId}`, '_blank');
          } else {
            setError(data.error || 'Failed to start crawling');
          }
        } catch (error) {
          setError('Network error: ' + error.message);
        } finally {
          setIsStarting(false);
        }
      };

      const selectTestUrl = (testUrl) => {
        setUrl(testUrl.url);
      };

      return (
        <div className="massive-crawler-app">
          <header className="app-header">
            <div className="header-content">
              <h1>Visual RAG Pro V5.2-01 - Massive Crawler (FIXED)</h1>
              <p>Configuración corregida para crawling masivo real</p>
            </div>
          </header>

          {error && (
            <div className="error-banner">
              <div className="error-content">
                <span className="error-icon">{'\u26a0\ufe0f'}</span>
                <span className="error-message">{error}</span>
                <button className="error-close" onClick={() => setError(null)}>{'\u2715'}</button>
              </div>
            </div>
          )}

          <main className="app-main">
            <div className="warning-box">
              <h4>{'\u26a0\ufe0f'} Configuración Corregida para Crawling Masivo</h4>
              <ul>
                <li><strong>Max Concurrency:</strong> 10 hilos paralelos</li>
                <li><strong>Max Depth:</strong> 6 niveles de profundidad</li>
                <li><strong>Rate Limit:</strong> 300ms entre peticiones</li>
                <li><strong>Max Links per Page:</strong> 1000 enlaces</li>
                <li><strong>Exclude Patterns:</strong> Solo archivos binarios y auth</li>
                <li><strong>Screenshots:</strong> Habilitados</li>
              </ul>
            </div>

            <div className="test-suggestions">
              <h3>URLs para Probar Crawling Masivo Real</h3>
              {testUrls.map((test, index) => (
                <div key={index} className="test-url" onClick={() => selectTestUrl(test)}>
                  <span className="url">{test.url}</span>
                  <span className="description">{test.description}</span>
                  <span className="description" style={{color: '#28a745', fontWeight: 'bold'}}>
                    {'\u2713'} {test.expected}
                  </span>
                </div>
              ))}
            </div>

            <div className="massive-config">
              <h3>Configuración Optimizada para Crawling Masivo</h3>
              <div className="config-grid">
                <div className="config-field">
                  <label>Max Concurrency:</label>
                  <input
                    type="number"
                    value={massiveConfig.crawler.maxConcurrency}
                    disabled
                  />
                  <small>Hilos paralelos</small>
                </div>
                
                <div className="config-field">
                  <label>Max Depth:</label>
                  <input
                    type="number"
                    value={massiveConfig.crawler.maxDepth}
                    disabled
                  />
                  <small>Profundidad máxima</small>
                </div>
                
                <div className="config-field">
                  <label>Rate Limit Delay:</label>
                  <input
                    type="number"
                    value={massiveConfig.crawler.rateLimitDelay}
                    disabled
                  />
                  <small>Delay entre peticiones (ms)</small>
                </div>
                
                <div className="config-field">
                  <label>Max Links per Page:</label>
                  <input
                    type="number"
                    value={massiveConfig.discovery.maxLinksPerPage}
                    disabled
                  />
                  <small>Enlaces máximos por página</small>
                </div>

                <div className="config-field">
                  <label>Exclude Patterns:</label>
                  <input
                    type="text"
                    value="Solo binarios + auth"
                    disabled
                  />
                  <small>Patrones de exclusión corregidos</small>
                </div>

                <div className="config-field">
                  <label>Screenshots:</label>
                  <input
                    type="text"
                    value={massiveConfig.reporting.includeScreenshots ? 'Enabled' : 'Disabled'}
                    disabled
                  />
                  <small>Capturas de pantalla</small>
                </div>
              </div>
            </div>

            <div className="url-input-section">
              <h2>Iniciar Crawling Masivo Real</h2>
              <div className="url-input-container">
                <input
                  type="text"
                  placeholder="Enter website URL for massive crawling..."
                  value={url}
                  onChange={(e) => setUrl(e.target.value)}
                  className={`url-input ${url && !validateUrl(url) ? 'invalid' : ''}`}
                  onKeyPress={(e) => e.key === 'Enter' && startCrawling()}
                />
                <button
                  onClick={startCrawling}
                  disabled={!url || !validateUrl(url) || isStarting}
                  className="start-button"
                >
                  {isStarting ? 'Starting Massive Crawler...' : 'Start Massive Crawling'}
                </button>
              </div>
              {url && !validateUrl(url) && (
                <p className="url-error">Please enter a valid URL (e.g., https://example.com)</p>
              )}
              {sessionId && (
                <p style={{color: '#28a745', marginTop: '10px'}}>
                  {'\u2705'} Massive Crawling iniciado! Session ID: {sessionId}
                  <br />
                  <small>Abriendo dashboard en nueva pestaña...</small>
                </p>
              )}
            </div>
          </main>

          <footer className="app-footer">
            <p>Visual RAG Pro V5.2-01 - Massive Website Crawling System (FIXED)</p>
            <p>Configuración optimizada para crawling masivo real con patrones corregidos</p>
          </footer>
        </div>
      );
    };

    ReactDOM.render(<MassiveCrawlerFixed />, document.getElementById('root'));
  </script>
</body>
</html>
